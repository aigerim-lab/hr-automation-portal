{% extends "base.html" %}

{% block title %}Edit Employee{% endblock %}

{% block content %}

<div class="card">
    <h1>Edit Employee</h1>
    <p>Update structured employee profile information.</p>
</div>

<div class="card">
    <form action="/employees/{{ employee.id }}/edit" method="post">

        <label>Full Name</label>
        <input type="text" name="full_name" value="{{ employee.full_name }}" required>

        <label>Department</label>
        <input type="text" name="department" value="{{ employee.department }}" required>

        <label>Position</label>
        <input type="text" name="position" value="{{ employee.position }}" required>

        <label>Experience Summary</label>
        <textarea name="experience_summary" rows="5">{{ employee.experience_summary or "" }}</textarea>

        <button class="btn" type="submit">Save Changes</button>
        <a class="btn btn-secondary" href="/employees/{{ employee.id }}">Cancel</a>
    </form>
</div>

{% endblock %}
